<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to Google Fonts for faster font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Load fonts asynchronously to prevent render blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" />
    </noscript>
    
    <!-- Preload LCP hero image for faster Largest Contentful Paint -->
    <link rel="preload" as="image" href="/src/assets/hero-coastal.jpg" type="image/jpeg" fetchpriority="high" />
    
    <title>Melia King Solar | Your Solar King</title>
    <meta
      name="description"
      content="Melia King Solar - Your Solar King. Expert solar panel installation, HVAC, Title 24 roofing, and QuietCool whole house fans. Serving 12+ states."
    />
    <meta name="author" content="Melia King Solar" />
    <meta name="theme-color" content="#1a4a3d" />

    <!-- Icons - Full set for all browsers/devices -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="Melia King Solar | Your Solar King" />
    <meta
      property="og:description"
      content="Your Solar King. Expert solar panel installation and whole-home energy solutions in 12+ states."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://meliasolar.com" />
    <meta property="og:image" content="https://meliasolar.com/melia-og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Melia King Solar | Your Solar King" />
    <meta name="twitter:description" content="Your Solar King. Expert solar panel installation in 12+ states." />
    <meta name="twitter:image" content="https://meliasolar.com/melia-og-image.png" />
    
    <!-- Critical CSS for faster FCP - includes above-the-fold styles -->
    <style>
      *,*::before,*::after{box-sizing:border-box}
      body{margin:0;font-family:Inter,system-ui,-apple-system,sans-serif;background:#fff;color:#1a1a1a;line-height:1.6}
      #root{min-height:100vh}
      /* Hero section critical styles */
      .hero-placeholder{position:relative;min-height:100vh;background:linear-gradient(135deg,#1a4a3d 0%,#0d2a24 100%);display:flex;align-items:center}
      h1,h2,h3{font-family:'Playfair Display',Georgia,serif;margin:0}
      /* Prevent layout shift */
      img{max-width:100%;height:auto}
      /* Skeleton loading state */
      .loading-skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
      @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
